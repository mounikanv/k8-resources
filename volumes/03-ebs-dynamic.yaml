#PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-dynamic
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: roboshop-ebs-sc
  resources:
    requests:
      storage: 4Gi
---
#POD
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    purpose: ebs-dynamic-demo
    project: roboshop
spec:
 nodeSelector:
    topology.kubernetes.io/zone: us-east-1d
 containers:
  - name: nginx
    image: nginx 
    volumeMounts:
    - name: persistent-storage
      mountPath: /user/share/nginx/html
 volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: ebs-dynamic      